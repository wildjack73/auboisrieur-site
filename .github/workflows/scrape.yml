name: Scrape & Deploy

on:
  # Toutes les 3 heures entre 7h et 22h UTC (9h-minuit Paris)
  schedule:
    - cron: "0 7,10,13,16,19,22 * * *"
  # Lancement manuel
  workflow_dispatch:
    inputs:
      date:
        description: "Date à scraper (YYYY-MM-DD, vide = aujourd'hui)"
        required: false
      mode:
        description: "Mode: scrape (défaut) ou rebuild (regénère depuis le cache)"
        required: false
        default: "scrape"
        type: choice
        options:
          - scrape
          - rebuild

concurrency:
  group: scrape-deploy
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      # Cache stable — clé fixe "site-data-v1", jamais invalidée
      # On utilise save-always pour sauvegarder même si le run échoue
      - name: Restore data cache
        uses: actions/cache@v4
        id: data-cache
        with:
          path: |
            site/data
            site/lot
          key: site-data-v1
          save-always: true

      - name: Bootstrap data from repo archive (if cache is empty or smaller)
        if: hashFiles('data-cache.tar.gz') != ''
        run: |
          mkdir -p site/data
          CACHE_COUNT=$(ls site/data/*.json 2>/dev/null | wc -l)
          ARCHIVE_COUNT=$(tar -tzf data-cache.tar.gz 2>/dev/null | grep '\.json$' | wc -l)
          echo "📊 Cache: $CACHE_COUNT lots | Archive: $ARCHIVE_COUNT lots"
          if [ "$ARCHIVE_COUNT" -gt "$CACHE_COUNT" ]; then
            echo "📦 Bootstrapping from archive ($ARCHIVE_COUNT > $CACHE_COUNT)..."
            tar -xzf data-cache.tar.gz -C site/data
            echo "✅ Bootstrapped $(ls site/data/*.json 2>/dev/null | wc -l) lot files"
          else
            echo "⏭️ Cache already has more data than archive"
          fi

      - name: Test API - compare upcoming vs past sale data
        run: |
          node -e "
          const {execSync} = require('child_process');
          const API = 'https://api.interencheres.com/api/v1';
          function f(url) { return JSON.parse(execSync('curl -sL --retry 2 --max-time 15 -H \"Accept: application/json\" \"'+url+'\"', {encoding:'utf-8',maxBuffer:50e6})); }

          // Get tomorrow's date
          const d = new Date(); d.setDate(d.getDate()+1);
          const tomorrow = d.toISOString().slice(0,10);
          const today = new Date().toISOString().slice(0,10);

          console.log('=== API DATA COMPARISON TEST ===');
          console.log('Today:', today, '| Tomorrow:', tomorrow);

          // 1. Try upcoming sales (tomorrow)
          try {
            const sales = f(API+'/ie4_sales?limit=50&sort=datetime&filters%5Bstatus%5D=published');
            const futureSales = sales.filter(s => s.datetime && s.datetime.substring(0,10) >= tomorrow);
            const pastSales = sales.filter(s => s.datetime && s.datetime.substring(0,10) === today);
            console.log('\\nFuture sales (tomorrow+):', futureSales.length);
            console.log('Today sales:', pastSales.length);

            // Compare a future lot vs a past lot
            const testSale = futureSales[0] || pastSales[0];
            if (testSale) {
              console.log('\\nTesting sale:', testSale.id, testSale.datetime?.substring(0,16), testSale.name?.substring(0,60));
              const items = f(API+'/ie4_items?filters%5Bsale%5D='+testSale.id+'&limit=3');
              console.log('Items found:', items.length);
              items.forEach((i,idx) => {
                console.log('\\n--- LOT '+(idx+1)+' (ID:'+i.id+') ---');
                console.log('Category:', i.category?.name || 'VIDE');
                console.log('Description length:', (i.description||'').length);
                console.log('Description preview:', (i.description||'VIDE').substring(0,200));
                console.log('Title FR:', (i.title_translations?.['fr-FR']||'VIDE').substring(0,150));
                console.log('Photos:', i.medias?.length || 0);
                console.log('Estimates:', JSON.stringify(i.pricing?.estimates));
                console.log('Starting price:', i.pricing?.starting_price);
                console.log('Auctioned:', JSON.stringify(i.pricing?.auctioned));
              });
            }

            // Also test a past sale for comparison
            const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
            const yday = yesterday.toISOString().slice(0,10);
            const ydaySales = sales.filter(s => s.datetime && s.datetime.substring(0,10) === yday);
            if (ydaySales[0]) {
              const items2 = f(API+'/ie4_items?filters%5Bsale%5D='+ydaySales[0].id+'&limit=2');
              console.log('\\n=== YESTERDAY SALE (comparison) ===');
              console.log('Sale:', ydaySales[0].id, ydaySales[0].name?.substring(0,60));
              items2.forEach((i,idx) => {
                console.log('\\n--- PAST LOT '+(idx+1)+' ---');
                console.log('Category:', i.category?.name || 'VIDE');
                console.log('Desc length:', (i.description||'').length);
                console.log('Desc:', (i.description||'VIDE').substring(0,200));
                console.log('Title FR:', (i.title_translations?.['fr-FR']||'VIDE').substring(0,150));
                console.log('Photos:', i.medias?.length || 0);
                console.log('Estimates:', JSON.stringify(i.pricing?.estimates));
                console.log('Auctioned:', JSON.stringify(i.pricing?.auctioned));
              });
            }
          } catch(e) { console.log('Test failed:', e.message); }
          console.log('\\n=== END TEST ===');
          "

      - name: Scrape + build + AI (50 lots)
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          GA_ID: ${{ secrets.GA_ID }}
          AD_SLOT_HEADER: ${{ secrets.AD_SLOT_HEADER }}
          AD_SLOT_SIDEBAR: ${{ secrets.AD_SLOT_SIDEBAR }}
          AD_SLOT_INARTICLE: ${{ secrets.AD_SLOT_INARTICLE }}
          AD_SLOT_BETWEENLOTS: ${{ secrets.AD_SLOT_BETWEENLOTS }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOATCOUNTER_TOKEN: ${{ secrets.GOATCOUNTER_TOKEN }}
          SKIP_FTP: "true"
          AI_BUDGET: "100"
          SKIP_FORCE_REGEN: "true"
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_PATH: ${{ secrets.FTP_REMOTE_PATH }}
        run: |
          MODE="${{ github.event.inputs.mode || 'scrape' }}"
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.date }}"
          fi

          if [ "$MODE" = "rebuild" ]; then
            node daemon.mjs --rebuild $DATE_ARG
          else
            node daemon.mjs --once $DATE_ARG
          fi

      - name: Deploy via lftp
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_PATH: ${{ secrets.FTP_REMOTE_PATH }}
        run: |
          sudo apt-get install -y -qq lftp > /dev/null 2>&1
          REMOTE="${FTP_REMOTE_PATH:-/public_html}"
          echo "📤 Deploy vers $REMOTE"
          # lftp: --only-newer = ne jamais supprimer, seulement ajouter/mettre à jour
          # Retry up to 3 times (Hostinger FTP can be flaky)
          for attempt in 1 2 3; do
            echo "🔄 Tentative $attempt/3..."
            lftp -c "
              set ftp:ssl-allow no;
              set net:timeout 60;
              set net:max-retries 10;
              set net:reconnect-interval-base 5;
              set net:reconnect-interval-multiplier 2;
              set mirror:parallel-transfer-count 8;
              open -u $FTP_USER,$FTP_PASSWORD $FTP_HOST;
              mirror --reverse --only-newer --parallel=8 --exclude data/ --verbose=1 site/ $REMOTE/;
              quit;
            " && echo "✅ Déploiement terminé" && break
            echo "⚠️ Tentative $attempt échouée, retry..."
            sleep 10
          done

      # Mettre à jour l'archive bootstrap à chaque run réussi
      - name: Update data-cache archive
        run: |
          DATA_COUNT=$(ls site/data/*.json 2>/dev/null | wc -l)
          CURRENT_COUNT=0
          if [ -f data-cache.tar.gz ]; then
            CURRENT_COUNT=$(tar -tzf data-cache.tar.gz 2>/dev/null | grep '\.json$' | wc -l)
          fi
          echo "📊 Data: $DATA_COUNT lots | Archive: $CURRENT_COUNT lots"
          # Update if data has grown by 50+ lots OR archive is outdated
          if [ "$DATA_COUNT" -gt "$((CURRENT_COUNT + 50))" ] || [ "$DATA_COUNT" -gt 0 -a "$CURRENT_COUNT" -eq 0 ]; then
            echo "📦 Updating archive ($CURRENT_COUNT → $DATA_COUNT lots)..."
            tar -czf data-cache.tar.gz -C site/data .
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data-cache.tar.gz
            git commit -m "Auto-update data-cache.tar.gz ($DATA_COUNT lots)" || true
            git push || true
            echo "✅ Archive mise à jour"
          else
            echo "⏭️ Archive déjà à jour (écart < 1000 lots)"
          fi
