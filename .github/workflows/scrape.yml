name: Scrape → VPS

on:
  schedule:
    - cron: "0 7,19 * * *"
  workflow_dispatch:

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Restore data cache
        uses: actions/cache@v4
        id: data-cache
        with:
          path: |
            site/data
          key: site-data-v1
          restore-keys: |
            site-data-
          save-always: true

      - name: Scrape via daemon.mjs
        env:
          SKIP_FTP: "true"
          AI_BUDGET: "0"
          SKIP_FORCE_REGEN: "true"
        run: node daemon.mjs --once

      - name: Export lots to JSON for VPS
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const dataDir = 'site/data';
          const files = fs.readdirSync(dataDir).filter(f => f.endsWith('.json'));
          console.log('📦 Exporting', files.length, 'lot files...');
          const lots = [];
          for (const f of files) {
            try {
              const d = JSON.parse(fs.readFileSync(path.join(dataDir, f), 'utf-8'));
              const item = d.item || d;
              const sale = d.sale || {};
              const org = sale.organization || item.organization || {};
              const addr = sale.address || org.address || {};
              // Interencheres moved lot text out of item.description into *_translations.fr-FR.
              const raw = item.description || item.description_translations?.['fr-FR'] || item.title_translations?.['fr-FR'] || item.description_translations?.['fr'] || item.title_translations?.['fr'] || '';
              const cat = item._originalCategory || item.category?.name || '';
              const sold = item.pricing?.auctioned?.price != null;
              const price = item.pricing?.auctioned?.price || 0;
              const photos = (item.medias || []).map(m => {
                if (typeof m === 'string') return m;
                const u = m?.rewriteImgUrl?.original || m?.rewriteImgUrl?.lg || m?.url || '';
                return u.startsWith('//') ? 'https:' + u : u;
              }).filter(Boolean);

              function cleanTitle(r) {
                if (!r) return '';
                let t = r.replace(/^\s*(lot\s+\d+[\s:.-]*|n°\s*\d+[\s:.-]*)/i, '');
                t = t.replace(/\s+/g, ' ').trim();
                return t.length > 120 ? t.substring(0, 117) + '...' : t;
              }
              function slugify(text) {
                return String(text || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                  .toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').substring(0, 80);
              }

              const ct = cleanTitle(raw);
              lots.push({
                id: item.id,
                title: raw.substring(0, 300),
                clean_title: ct,
                description: raw,
                category: cat,
                category_id: item.category?.id || null,
                sold: sold ? 1 : 0,
                price,
                estimate_low: item.pricing?.estimates?.low || item.pricing?.estimates?.min || 0,
                estimate_high: item.pricing?.estimates?.max || 0,
                starting_price: item.pricing?.starting_price || 0,
                commission_rate: sale.options?.commission_rate?.voluntary || sale.options?.commission_rate?.judicial || 0,
                sale_date: sale.datetime?.substring(0, 10) || '',
                sale_id: sale.id || 0,
                org_name: org.names?.voluntary || org.names?.judicial || '',
                org_email: org.address?.email || '',
                org_phone: org.address?.telephone || '',
                org_address: [addr.address, addr.zipCode, addr.city].filter(Boolean).join(', '),
                city: addr.city || '',
                postcode: addr.zipCode || '',
                slug: slugify(ct) + '-' + item.id,
                thumb: photos[0] || '',
                photos,
              });
            } catch(e) {}
          }
          console.log('✅', lots.length, 'lots exportés');
          console.log('  Avec catégorie:', lots.filter(l => l.category).length);
          console.log('  Vendus:', lots.filter(l => l.sold).length);
          console.log('  Invendus:', lots.filter(l => !l.sold).length);
          fs.writeFileSync('lots.json', JSON.stringify(lots));
          console.log('📦 lots.json:', (fs.statSync('lots.json').size / 1024 / 1024).toFixed(1), 'MB');
          "

      - name: Send to VPS
        env:
          VPS_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_KEY" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -H 91.121.223.36 >> ~/.ssh/known_hosts 2>/dev/null
          scp -i ~/.ssh/vps_key lots.json debian@91.121.223.36:/var/www/adjuge/data/
          echo "✅ $(wc -c < lots.json | tr -d ' ') bytes sent"

      - name: Ingest + build on VPS
        env:
          VPS_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          ssh -i ~/.ssh/vps_key debian@91.121.223.36 "cd /var/www/adjuge && cat data/lots.json | node scripts/ingest.mjs && node scripts/fix-cats-post-ingest.mjs && node scripts/clean-ai.mjs && node scripts/regen-slugs.mjs && node scripts/auto-score.mjs && node scripts/build.mjs && node scripts/split-sitemap.mjs && node scripts/setup-fts.mjs && node scripts/gen-carte.mjs && node scripts/gen-recherche-cats.mjs && node scripts/gen-maisons.mjs && node scripts/gen-sitemap-maisons.mjs"
          echo "✅ Site rebuilt + sitemap + search + map + filters"
          # Launch AI scoring in background for new lots > 200€ (non-blocking)
          ssh -i ~/.ssh/vps_key debian@91.121.223.36 "cd /var/www/adjuge && SCORE_BUDGET=500 OPENAI_API_KEY='${{ secrets.OPENAI_API_KEY }}' EBAY_CLIENT_ID='${{ secrets.EBAY_CLIENT_ID }}' EBAY_CLIENT_SECRET='${{ secrets.EBAY_CLIENT_SECRET }}' DATAFORSEO_LOGIN='${{ secrets.DATAFORSEO_LOGIN }}' DATAFORSEO_PASSWORD='${{ secrets.DATAFORSEO_PASSWORD }}' nohup node scripts/score.mjs > /tmp/score-auto.log 2>&1 &"
          echo "🤖 AI scoring launched in background (500 lots)"
