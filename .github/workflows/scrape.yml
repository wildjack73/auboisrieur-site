name: Scrape & Deploy

on:
  # Toutes les 2 heures entre 8h et 22h (heure Paris = UTC+1/+2)
  schedule:
    - cron: "0 7,9,11,13,15,17,19,21 * * *"
  # Lancement manuel
  workflow_dispatch:
    inputs:
      date:
        description: "Date à scraper (YYYY-MM-DD, vide = aujourd'hui)"
        required: false

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run scraper (single run)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_PATH: ${{ secrets.FTP_REMOTE_PATH }}
          SITE_URL: ${{ secrets.SITE_URL }}
          GA_ID: ${{ secrets.GA_ID }}
          AD_SLOT_HEADER: ${{ secrets.AD_SLOT_HEADER }}
          AD_SLOT_SIDEBAR: ${{ secrets.AD_SLOT_SIDEBAR }}
          AD_SLOT_INARTICLE: ${{ secrets.AD_SLOT_INARTICLE }}
          AD_SLOT_BETWEENLOTS: ${{ secrets.AD_SLOT_BETWEENLOTS }}
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            node daemon.mjs --once --date "${{ github.event.inputs.date }}"
          else
            node daemon.mjs --once
          fi
