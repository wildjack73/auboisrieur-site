name: Scrape → VPS

on:
  schedule:
    - cron: "0 7,19 * * *"  # 2x/jour: 9h + 21h Paris
  workflow_dispatch:

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Scrape Interenchères API → JSON
        run: |
          cat << 'SCRAPER' > scrape.mjs
          const {execSync} = require('child_process');
          const fs = require('fs');
          const API = 'https://api.interencheres.com/api/v1';
          const PAGE_SIZE = 300;

          function apiFetch(url) {
            const raw = execSync(
              'curl -sL --retry 3 --max-time 30 -H "Accept: application/json" "' + url + '"',
              { encoding: 'utf-8', maxBuffer: 100 * 1024 * 1024 }
            );
            return JSON.parse(raw);
          }

          function fetchAllItems(saleId) {
            const items = [];
            let offset = 0;
            while (true) {
              const batch = apiFetch(
                API + '/ie4_items?filters%5Bsale%5D=' + saleId +
                '&limit=' + PAGE_SIZE + '&offset=' + offset + '&sort=id'
              );
              if (!Array.isArray(batch) || batch.length === 0) break;
              items.push(...batch);
              if (batch.length < PAGE_SIZE) break;
              offset += PAGE_SIZE;
            }
            return items;
          }

          function cleanTitle(raw) {
            if (!raw) return '';
            let t = raw.replace(/^\s*(lot\s+\d+[\s:.-]*|n°\s*\d+[\s:.-]*)/i, '');
            t = t.replace(/\s+/g, ' ').trim();
            if (t.length > 120) t = t.substring(0, 117) + '...';
            return t;
          }

          function slugify(text) {
            return String(text || '')
              .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
              .toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '')
              .substring(0, 80);
          }

          // Scrape last 7 days
          const lots = [];
          for (let daysAgo = 0; daysAgo < 7; daysAgo++) {
            const d = new Date();
            d.setDate(d.getDate() - daysAgo);
            const dateStr = d.toISOString().slice(0, 10);
            console.log('📅 Scraping', dateStr, '...');

            try {
              const sales = apiFetch(
                API + '/ie4_sales?limit=200&sort=-datetime&filters%5Bdatetime%5D=' + dateStr +
                '&filters%5Bstatus%5D=3&filters%5Btype%5D=live'
              );
              console.log('  ' + sales.length + ' ventes');

              for (const sale of sales) {
                try {
                  const items = fetchAllItems(sale.id);
                  const org = sale.organization || {};
                  const addr = sale.address || org.address || {};
                  const commission = sale.options?.commission_rate?.voluntary || sale.options?.commission_rate?.judicial || 0;

                  for (const item of items) {
                    const raw = item.description || item.title_translations?.['fr-FR'] || '';
                    const cat = item.category?.name || '';
                    const sold = item.pricing?.auctioned?.price != null;
                    const price = item.pricing?.auctioned?.price || 0;
                    const photos = (item.medias || []).map(m => {
                      if (typeof m === 'string') return m;
                      return m?.rewriteImgUrl?.lg || m?.rewriteImgUrl?.original || m?.url || '';
                    }).filter(Boolean).map(u => u.startsWith('//') ? 'https:' + u : u);

                    lots.push({
                      id: item.id,
                      title: raw.substring(0, 300),
                      clean_title: cleanTitle(raw),
                      description: raw,
                      category: cat,
                      category_id: item.category?.id || null,
                      sold: sold ? 1 : 0,
                      price: price,
                      estimate_low: item.pricing?.estimates?.low || item.pricing?.estimates?.min || 0,
                      estimate_high: item.pricing?.estimates?.max || 0,
                      starting_price: item.pricing?.starting_price || 0,
                      commission_rate: commission,
                      sale_date: sale.datetime?.substring(0, 10) || dateStr,
                      sale_id: sale.id,
                      org_name: org.names?.voluntary || org.names?.judicial || '',
                      org_email: org.address?.email || '',
                      org_phone: org.address?.telephone || '',
                      org_address: [addr.address, addr.zipCode, addr.city].filter(Boolean).join(', '),
                      city: addr.city || '',
                      postcode: addr.zipCode || '',
                      slug: slugify(cleanTitle(raw)) + '-' + item.id,
                      thumb: photos[0] || '',
                      photos: photos,
                    });
                  }
                  console.log('  Vente ' + sale.id + ': ' + items.length + ' lots');
                } catch(e) {
                  console.warn('  ⚠ Vente ' + sale.id + ': ' + e.message);
                }
              }
            } catch(e) {
              console.warn('  ⚠ ' + dateStr + ': ' + e.message);
            }
          }

          console.log('\\n✅ Total: ' + lots.length + ' lots scrapés');
          console.log('  Vendus: ' + lots.filter(l => l.sold).length);
          console.log('  Invendus: ' + lots.filter(l => !l.sold).length);
          console.log('  Avec catégorie: ' + lots.filter(l => l.category).length);

          fs.writeFileSync('lots.json', JSON.stringify(lots));
          console.log('📦 lots.json: ' + (fs.statSync('lots.json').size / 1024 / 1024).toFixed(1) + ' MB');
          SCRAPER
          node scrape.mjs

      - name: Send to VPS via SCP
        env:
          VPS_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_KEY" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -H 91.121.223.36 >> ~/.ssh/known_hosts 2>/dev/null

          echo "📤 Sending lots.json to VPS..."
          scp -i ~/.ssh/vps_key lots.json debian@91.121.223.36:/var/www/adjuge/data/
          echo "✅ Sent $(wc -c < lots.json | tr -d ' ') bytes"

      - name: Trigger ingest + build on VPS
        env:
          VPS_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          ssh -i ~/.ssh/vps_key debian@91.121.223.36 "cd /var/www/adjuge && node scripts/ingest.mjs && node scripts/build.mjs"
          echo "✅ Site rebuilt on VPS"
