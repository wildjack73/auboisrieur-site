name: Scrape & Deploy

on:
  # Toutes les 2 heures entre 8h et 22h (heure Paris = UTC+1/+2)
  schedule:
    - cron: "0 7,9,11,13,15,17,19,21 * * *"
  # Lancement manuel
  workflow_dispatch:
    inputs:
      date:
        description: "Date à scraper (YYYY-MM-DD, vide = aujourd'hui)"
        required: false
      mode:
        description: "Mode: scrape (défaut) ou rebuild (regénère depuis le cache)"
        required: false
        default: "scrape"
        type: choice
        options:
          - scrape
          - rebuild

concurrency:
  group: scrape-deploy
  cancel-in-progress: true

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Restore data cache
        uses: actions/cache@v4
        id: data-cache
        with:
          path: site/data
          key: site-data-${{ github.run_number }}
          restore-keys: |
            site-data-

      - name: Bootstrap data from repo archive (first time only)
        if: steps.data-cache.outputs.cache-hit != 'true' && hashFiles('data-cache.tar.gz') != ''
        run: |
          mkdir -p site/data
          tar -xzf data-cache.tar.gz -C site/data
          echo "📦 Bootstrapped $(ls site/data/*.json 2>/dev/null | wc -l) cached lot files"

      - name: Run scraper (no FTP)
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          GA_ID: ${{ secrets.GA_ID }}
          AD_SLOT_HEADER: ${{ secrets.AD_SLOT_HEADER }}
          AD_SLOT_SIDEBAR: ${{ secrets.AD_SLOT_SIDEBAR }}
          AD_SLOT_INARTICLE: ${{ secrets.AD_SLOT_INARTICLE }}
          AD_SLOT_BETWEENLOTS: ${{ secrets.AD_SLOT_BETWEENLOTS }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOATCOUNTER_TOKEN: ${{ secrets.GOATCOUNTER_TOKEN }}
          SKIP_FTP: "true"
        run: |
          MODE="${{ github.event.inputs.mode || 'scrape' }}"
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.date }}"
          fi

          if [ "$MODE" = "rebuild" ]; then
            echo "🔄 Mode rebuild — regénération depuis le cache"
            node daemon.mjs --rebuild $DATE_ARG
          else
            echo "🔍 Mode scrape — scraping + génération"
            node daemon.mjs --once $DATE_ARG
          fi

      - name: Deploy via lftp (parallel mirror)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_PATH: ${{ secrets.FTP_REMOTE_PATH }}
        run: |
          sudo apt-get install -y -qq lftp > /dev/null 2>&1

          REMOTE="${FTP_REMOTE_PATH:-/public_html}"
          FILE_COUNT=$(find site -not -path "site/data/*" -type f | wc -l)
          echo "📤 $FILE_COUNT fichiers à synchroniser vers $REMOTE"

          # lftp mirror: upload only new/modified files, 10 parallel connections
          lftp -c "
            set ftp:ssl-allow no;
            set net:timeout 30;
            set net:max-retries 5;
            set net:reconnect-interval-base 5;
            set mirror:parallel-transfer-count 10;
            set mirror:use-pget-n 5;
            open -u $FTP_USER,$FTP_PASSWORD $FTP_HOST;
            mirror --reverse --only-newer --parallel=10 --exclude data/ --verbose=1 site/ $REMOTE/;
            quit;
          "
          echo "✅ Déploiement terminé"
